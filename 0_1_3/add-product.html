<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АПО СОЮЗ - Добавление товара</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header>
            <div class="container">
                <div class="header-content">
                    <div class="logo">АПО СОЮЗ</div>
                    <nav>
                        <ul>
                            <li><a href="index.html">Главная</a></li>
                            <li><a href="categories.html">Каталог</a></li>
                            <li><a href="about.html">О нас</a></li>
                            <li><a href="auth.html">Авторизация</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>
        
        <section class="add-product-section">
            <div class="container">
                <div class="add-product-card">
                    <h2>Добавление товара</h2>
                    <form id="add-product-form">
                        <div class="form-group">
                            <label for="product-name">Название товара</label>
                            <input type="text" id="product-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="product-description">Описание товара</label>
                            <textarea id="product-description" class="form-control" rows="4" placeholder="Введите описание товара..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="product-image">Изображение товара</label>
                            <input type="file" id="product-image" class="form-control" accept="image/*">
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-secondary" onclick="window.location.href='categories.html'">Отменить</button>
                            <button type="submit" class="btn">Добавить</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        
        <footer>
            <div class="container">
                <p>© 2014-2026 ООО "АПО "СОЮЗ"</p>
            </div>
        </footer>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
